<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moodle Subheading</title>

<style>
:root{
    --brand:#ec1d51;
    --dark:#101014;
    --soft:#f5f5f7;
}

*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;
    width:100%;
    overflow:hidden;
    background:transparent;
    font-family:"Segoe UI", Arial, sans-serif;
}

.subheading{
    width:100%;
    background:var(--soft);
    border-left:8px solid var(--brand);
    padding:22px 28px;
    display:flex;
    align-items:center;
    gap:18px;
    position:relative;
    overflow:hidden;
}

.subheading::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.55) 1px, transparent 1px);
    background-size:36px 36px;
    opacity:.45;
}

.icon{
    width:58px;
    height:58px;
    background:var(--dark);
    color:var(--brand);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.6rem;
    font-weight:900;
    position:relative;
    z-index:2;
    flex:0 0 auto;
}

.icon::after{
    color:var(--brand);
    line-height:1;
}

.content{
    position:relative;
    z-index:2;
}

.kicker{
    color:var(--brand);
    font-size:.72rem;
    font-weight:900;
    letter-spacing:.22em;
    text-transform:uppercase;
    margin-bottom:4px;
}

h2{
    margin:0;
    color:#202024;
    font-size:clamp(1.5rem,3vw,2.25rem);
    line-height:1.05;
    letter-spacing:-.035em;
}

.highlight{
    color:var(--brand);
}

.subtle-line{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:5px;
    background:var(--brand);
    transform-origin:left;
    animation:growLine 1.1s ease-out forwards;
}

.presentation .icon::after{
    content:"";
    width:34px;
    height:26px;
    border:3px solid var(--brand);
    border-radius:2px;
    position:absolute;
    top:13px;
    left:12px;
}

.presentation .icon::before{
    content:"";
    position:absolute;
    width:20px;
    height:3px;
    background:var(--brand);
    left:19px;
    bottom:12px;
    box-shadow:
        -6px 7px 0 -1px var(--brand),
        6px 7px 0 -1px var(--brand);
}

.activities .icon::after{
    content:"✓";
}

.resources .icon::after{
    content:"📁";
    font-family:"Segoe UI Emoji","Apple Color Emoji",sans-serif;
}

.task .icon::after{
    content:"📝";
    font-family:"Segoe UI Emoji","Apple Color Emoji",sans-serif;
}

.support .icon::after{
    content:"💬";
    font-family:"Segoe UI Emoji","Apple Color Emoji",sans-serif;
}

.video .icon::after{
    content:"▶";
}

.code .icon::after{
    content:"</>";
    font-family:Consolas, monospace;
    font-size:1.25rem;
}

.link .icon::after{
    content:"🔗";
    font-family:"Segoe UI Emoji","Apple Color Emoji",sans-serif;
}

.upload .icon::after{
    content:"⬆";
}

.reading .icon::after{
    content:"📖";
    font-family:"Segoe UI Emoji","Apple Color Emoji",sans-serif;
}

@keyframes growLine{
    from{
        transform:scaleX(0);
    }
    to{
        transform:scaleX(1);
    }
}

@media(max-width:700px){
    .subheading{
        padding:18px 20px;
    }

    .icon{
        width:48px;
        height:48px;
        font-size:1.2rem;
    }

    .presentation .icon::after{
        width:28px;
        height:22px;
        top:11px;
        left:10px;
    }

    .presentation .icon::before{
        width:16px;
        left:16px;
        bottom:9px;
    }
}
</style>
</head>

<body>

<section id="subheading" class="subheading activities">

    <div class="icon" aria-hidden="true"></div>

    <div class="content">
        <div class="kicker" id="kicker">Course Section</div>
        <h2 id="title">Lesson [Activities]</h2>
    </div>

    <div class="subtle-line"></div>

</section>

<script>
const params = new URLSearchParams(window.location.search);

const allowedTypes = [
    "presentation",
    "activities",
    "resources",
    "task",
    "support",
    "video",
    "code",
    "link",
    "upload",
    "reading"
];

const type = allowedTypes.includes(params.get("type"))
    ? params.get("type")
    : "activities";

const colour = params.get("colour");

if(colour && /^#([0-9A-F]{3}|[0-9A-F]{6})$/i.test(colour)){
    document.documentElement.style.setProperty("--brand", colour);
}

document.getElementById("subheading").className =
    "subheading " + type;

function setTitle(value){
    if(!value) return;

    const safe = value
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");

    document.getElementById("title").innerHTML =
        safe.replace(/\[(.*?)\]/g,'<span class="highlight">$1</span>');
}

if(params.get("kicker")){
    document.getElementById("kicker").textContent = params.get("kicker");
}

setTitle(params.get("title"));

function sendHeight(){
    const height = Math.ceil(
        document.getElementById("subheading").getBoundingClientRect().height
    );

    window.parent.postMessage({
        type:"moodle-subheading-height",
        height:height
    }, "*");
}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);

setTimeout(sendHeight,100);
setTimeout(sendHeight,400);
setTimeout(sendHeight,900);
</script>

</body>
</html>
