<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crosscutting Themes</title>

<style>
:root{
    --brand:#ec1d51;
    --dark:#101014;
    --soft:#f5f5f7;
    --card:#ffffff;
}

*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;
    width:100%;
    overflow:hidden;
    background:transparent;
    font-family:"Segoe UI", Arial, sans-serif;
}

.wrapper{
    width:100%;
    background:var(--soft);
    border-left:8px solid var(--brand);
    padding:28px;
    position:relative;
    overflow:hidden;
}

.wrapper::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(90deg, rgba(255,255,255,.65) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.6) 1px, transparent 1px);
    background-size:38px 38px;
    opacity:.45;
}

.header{
    position:relative;
    z-index:2;
    margin-bottom:22px;
}

.kicker{
    color:var(--brand);
    font-size:.72rem;
    font-weight:900;
    letter-spacing:.24em;
    text-transform:uppercase;
    margin-bottom:8px;
}

h1{
    margin:0;
    color:#101014;
    font-size:clamp(1.7rem,3.4vw,2.5rem);
    line-height:1.05;
    letter-spacing:-.04em;
}

.highlight{
    color:var(--brand);
}

.theme-grid{
    position:relative;
    z-index:2;
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:14px;
}

.theme-card{
    background:var(--card);
    min-height:120px;
    padding:18px;
    display:flex;
    gap:14px;
    align-items:flex-start;
    box-shadow:0 10px 24px rgba(0,0,0,.06);
    position:relative;
    overflow:hidden;
}

.theme-card::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width:5px;
    background:var(--brand);
    z-index:3;
}

.theme-card::after{
    content:"";
    position:absolute;
    inset:0;
    background:var(--dark);
    opacity:0;
    transition:opacity .25s ease;
}

.theme-card:hover::after,
.theme-card:focus-within::after{
    opacity:.96;
}

.icon{
    width:48px;
    height:48px;
    background:var(--dark);
    color:var(--brand);
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 auto;
    position:relative;
    z-index:4;
}

.icon svg{
    width:28px;
    height:28px;
    stroke:var(--brand);
    fill:none;
    stroke-width:2.3;
    stroke-linecap:round;
    stroke-linejoin:round;
}

.icon svg.daffodil-icon{
    width:32px;
    height:32px;
    stroke:none;
}

.icon svg.daffodil-icon path,
.icon svg.daffodil-icon circle{
    stroke:none;
}

.card-content{
    position:relative;
    z-index:4;
}

.card-title{
    color:#101014;
    font-size:1.05rem;
    font-weight:800;
    line-height:1.25;
    margin-bottom:8px;
    transition:color .25s ease;
}

.card-explanation{
    color:white;
    font-size:.92rem;
    line-height:1.45;
    opacity:0;
    transform:translateY(8px);
    transition:opacity .25s ease, transform .25s ease;
}

.theme-card:hover .card-title,
.theme-card:focus-within .card-title{
    color:var(--brand);
}

.theme-card:hover .card-explanation,
.theme-card:focus-within .card-explanation{
    opacity:1;
    transform:translateY(0);
}

.theme-card:hover .icon,
.theme-card:focus-within .icon{
    background:rgba(255,255,255,.06);
}

@media(max-width:950px){
    .theme-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
    }
}

@media(max-width:620px){
    .wrapper{
        padding:22px;
    }

    .theme-grid{
        grid-template-columns:1fr;
    }

    .theme-card{
        min-height:110px;
    }
}
</style>
</head>

<body>

<section class="wrapper" id="wrapper">

    <div class="header">
        <div class="kicker" id="kicker">Course Context</div>
        <h1 id="title">Crosscutting [Themes]</h1>
    </div>

    <div class="theme-grid" id="themeGrid"></div>

</section>

<script>
const params = new URLSearchParams(window.location.search);

function isValidHex(value){
    return /^#([0-9A-F]{3}|[0-9A-F]{6})$/i.test(value);
}

const colour = params.get("colour");

if(colour && isValidHex(colour)){
    document.documentElement.style.setProperty("--brand", colour);
}

function setTitle(value){
    if(!value) return;

    const safe = value
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");

    document.getElementById("title").innerHTML =
        safe.replace(/\[(.*?)\]/g,'<span class="highlight">$1</span>');
}

if(params.get("kicker")){
    document.getElementById("kicker").textContent = params.get("kicker");
}

setTitle(params.get("title"));

const defaultThemes = [
    {
        key:"literacy",
        title:"Literacy & Numeracy",
        explanation:"Through developing written, verbal, numerical and formal documentation skills."
    },
    {
        key:"esdgc",
        title:"ESDGC",
        explanation:"Through considering sustainability, global citizenship and ethical impact."
    },
    {
        key:"diversity",
        title:"Diversity & Equality",
        explanation:"Through considering inclusive design, accessibility and representation."
    },
    {
        key:"digital",
        title:"Digital Literacy",
        explanation:"Through using digital tools, platforms and professional digital communication."
    },
    {
        key:"enterprise",
        title:"Enterprise & Employability",
        explanation:"Through developing professional, workplace and project-ready skills."

    {
        key:"welsh",

];

        '</svg>'
};

function getThemeParam(index, field, fallback){
    return params.get("theme" + index + field) || fallback;
}

function buildThemeData(){
    return defaultThemes.map(function(item,index){
        const n = index + 1;

        return {
            key:item.key,
            title:getThemeParam(n,"Title",item.title),
            explanation:getThemeParam(n,"Text",item.explanation)
        };
    });
}

function renderCards(){
    const grid = document.getElementById("themeGrid");
    grid.innerHTML = "";

    buildThemeData().forEach(function(item){
        const card = document.createElement("article");
        card.className = "theme-card";
        card.tabIndex = 0;

        const icon = document.createElement("div");
        icon.className = "icon";
        icon.innerHTML = icons[item.key];

        const content = document.createElement("div");
        content.className = "card-content";

        const title = document.createElement("div");
        title.className = "card-title";
        title.textContent = item.title;

        const explanation = document.createElement("div");
        explanation.className = "card-explanation";
        explanation.textContent = item.explanation;

        content.appendChild(title);
        content.appendChild(explanation);
        card.appendChild(icon);
        card.appendChild(content);
        grid.appendChild(card);
    });
}

renderCards();

function sendHeight(){
    const height = Math.ceil(
        document.getElementById("wrapper").getBoundingClientRect().height
    );

    window.parent.postMessage({
        type:"moodle-crosscutting-height",
        height:height
    }, "*");
}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);

setTimeout(sendHeight,100);
setTimeout(sendHeight,400);
setTimeout(sendHeight,900);
</script>

</body>
</html>
